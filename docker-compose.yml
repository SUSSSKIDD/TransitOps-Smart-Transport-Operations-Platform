version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: transitops-server
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=TransitOps_Super_Secret_Key_For_Hackathon
      - CLIENT_URL=http://localhost:3000
      - COOKIE_SECURE=false
    volumes:
      - server_data:/app/prisma

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: transitops-client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
    depends_on:
      - server

volumes:
  server_data:
