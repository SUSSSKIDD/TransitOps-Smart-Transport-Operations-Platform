version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: transitops-db
    environment:
      - POSTGRES_DB=transitops
      - POSTGRES_USER=transitops
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transitops -d transitops"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: transitops-server
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://transitops:${DB_PASSWORD}@postgres:5432/transitops?schema=public
      - CLIENT_URL=http://localhost:3000
      - COOKIE_SECURE=false
      # JWT_SECRET must be set via environment variable or .env file
    volumes:
      - server_data:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: transitops-client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
    depends_on:
      - server

volumes:
  postgres_data:
  server_data:
